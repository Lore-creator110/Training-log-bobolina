<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Journal — ILA Cut B3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --accent: #c8f135;
    --accent2: #f1c135;
    --red: #ff4d4d;
    --text: #e8e8ea;
    --muted: #6b6b72;
    --muted2: #9898a0;
    --good: #4dff91;
    --ok: #f1c135;
    --bad: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 16px;
  }


  /* CHARTS PAGE */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:18px; }
  .stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .stat-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent); letter-spacing:1px; line-height:1; }
  .stat-sub { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted2); margin-top:3px; }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; }
  .chart-card-header { padding:14px 18px; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:1px; }
  .chart-card-body { padding:18px; overflow-x:auto; }
  .chart-svg { width:100%; overflow:visible; }
  .prog-table { width:100%; border-collapse:collapse; font-family:'DM Mono',monospace; font-size:11px; }
  .prog-table th { color:var(--muted); font-size:9px; letter-spacing:1px; text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
  .prog-table td { padding:7px 8px; border-bottom:1px solid #1e1e21; color:var(--text); vertical-align:middle; }
  .prog-table tr:last-child td { border-bottom:none; }
  .prog-table tr:hover td { background:var(--surface2); }
  .pr-badge { display:inline-block; background:rgba(200,241,53,.15); border:1px solid rgba(200,241,53,.3); color:var(--accent); font-size:9px; padding:1px 6px; border-radius:4px; margin-left:4px; }
  .delta-pos { color:var(--good); }
  .delta-neg { color:var(--red); }
  .delta-zero { color:var(--muted); }
  .feel-bar { display:inline-block; width:8px; height:8px; border-radius:50%; }

  /* HEADER */
  .app-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .week-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--muted2);
    white-space: nowrap;
  }
  .week-badge span { color: var(--accent); font-weight: 600; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 12px 20px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
    text-transform: uppercase;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { padding: 20px 24px 80px; max-width: 900px; margin: 0 auto; }

  /* SECTION: LOG SESSION */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--muted2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SESSION FORM */
  .session-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .form-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .day-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .day-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 1px;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .date-input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
  }

  /* EXERCISE CARDS IN FORM */
  .exercises-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .ex-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .ex-card:focus-within { border-color: #3a3a3e; }
  .ex-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .ex-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 1;
  }
  .ex-prescription {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }
  .ex-toggle {
    font-size: 16px;
    color: var(--muted);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .ex-card.open .ex-toggle { transform: rotate(90deg); }
  .ex-body {
    display: none;
    padding: 0 16px 16px;
    flex-direction: column;
    gap: 10px;
    animation: fadeIn .15s ease;
  }
  .ex-card.open .ex-body { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* SETS TABLE */
  .sets-section label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }
  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: left;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  .sets-table td { padding: 4px 4px; }
  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 8px;
    width: 30px;
  }
  .set-input {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 8px;
    border-radius: 6px;
    outline: none;
    width: 100%;
    text-align: center;
    transition: border-color .15s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; }
  .add-set-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 4px;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* FEELING */
  .feeling-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .feeling-row label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .feeling-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .feel-btn {
    font-size: 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .feel-btn span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    display: block;
    text-align: center;
    margin-top: 2px;
  }
  .feel-btn:hover { border-color: var(--muted2); }
  .feel-btn.sel-1 { border-color: var(--red); background: rgba(255,77,77,.1); }
  .feel-btn.sel-2 { border-color: var(--bad); background: rgba(255,107,53,.1); }
  .feel-btn.sel-3 { border-color: var(--ok); background: rgba(241,193,53,.1); }
  .feel-btn.sel-4 { border-color: var(--accent); background: rgba(200,241,53,.1); }
  .feel-btn.sel-5 { border-color: var(--good); background: rgba(77,255,145,.1); }

  .notes-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    resize: vertical;
    min-height: 64px;
    width: 100%;
    transition: border-color .15s;
    line-height: 1.5;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--muted); }

  /* VIDEO */
  .video-row { display: flex; flex-direction: column; gap: 6px; }
  .video-row label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .video-input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .video-input:focus { border-color: var(--accent2); }
  .video-input::placeholder { color: var(--muted); }

  /* TECH NOTE */
  .tech-note {
    background: rgba(200,241,53,.04);
    border: 1px solid rgba(200,241,53,.15);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .tech-note-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .tech-note-text {
    font-size: 11px;
    color: var(--muted2);
    line-height: 1.6;
    font-style: italic;
  }

  /* SAVE BTN */
  .form-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-save {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-save:hover { background: #d9ff50; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }
  .btn-clear {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-clear:hover { color: var(--red); border-color: var(--red); }

  /* HISTORY */
  .history-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .session-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .entry-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .entry-header:hover { background: var(--surface2); }
  .entry-day-badge {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1.5px;
    font-size: 14px;
    background: var(--accent);
    color: #000;
    padding: 3px 10px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
  }
  .entry-week {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--muted);
  }
  .entry-summary {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex: 1;
    text-align: right;
  }
  .entry-body {
    display: none;
    padding: 0 16px 16px;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .entry-open .entry-body { display: flex; }

  .entry-ex {
    padding: 10px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .entry-ex-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .feeling-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .f1 { background: var(--red); }
  .f2 { background: var(--bad); }
  .f3 { background: var(--ok); }
  .f4 { background: var(--accent); }
  .f5 { background: var(--good); }

  .sets-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }
  .set-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    color: var(--text);
  }
  .set-chip strong { color: var(--accent2); }

  .entry-note {
    font-size: 12px;
    color: var(--muted2);
    font-style: italic;
    line-height: 1.5;
  }
  .video-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .video-link:hover { text-decoration: underline; }

  /* PROGRESS VIEW */
  .progress-select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 20px;
    width: 100%;
    max-width: 360px;
    cursor: pointer;
  }
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .chart-area {
    padding: 20px;
    position: relative;
  }
  .chart-empty {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }
  /* Simple bar chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 100px;
    margin-bottom: 8px;
  }
  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height .3s ease;
    min-height: 2px;
    position: relative;
  }
  .bar-load { background: var(--accent); }
  .bar-e1rm { background: var(--accent2); opacity: .7; }
  .bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .bar-value {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted2);
    text-align: center;
  }
  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 2px;
  }

  .feeling-timeline {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px 20px 16px;
  }
  .feel-timeline-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .feel-timeline-item .bar-label { font-size: 9px; color: var(--muted); }

  /* DELETE */
  .btn-del {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-del:hover { color: var(--red); border-color: var(--red); }

  /* Week selector in form */
  .week-select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  /* Notification */
  .notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s ease;
    pointer-events: none;
  }
  .notif.show { transform: translateY(0); opacity: 1; }

  /* Page display */
  .page { display: none; }
  .page.active { display: block; }

  /* e1rm chip */
  .e1rm-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: rgba(241,193,53,.1);
    border: 1px solid rgba(241,193,53,.3);
    color: var(--accent2);
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
  }

  /* Separator in entry */
  .entry-body > .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  /* HISTORY: column layout equal cards */
  .entry-body {
    display: none;
    padding: 16px;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .entry-open .entry-body { display: flex; }
  .entry-ex {
    width: 100%;

  if(!draft[key]) draft[key] = {};
  exs.forEach(ex => {
    const table = document.getElementById('sets_' + ex.id);
    if(!table) return;
    const sets = [];
    for(let i = 1; i < table.rows.length; i++) {
      sets.push({
        load: document.getElementById('load_' + ex.id + '_' + i)?.value || '',
        reps: document.getElementById('reps_' + ex.id + '_' + i)?.value || '',
        rir:  document.getElementById('rir_'  + ex.id + '_' + i)?.value || ''
      });
    }
    const feelBtn = document.querySelector('[data-ex="' + ex.id + '"][class*="sel-"]');
    draft[key][ex.id] = {
      sets,
      feeling: feelBtn ? parseInt(feelBtn.dataset.val) : null,
      notes:   document.getElementById('notes_' + ex.id)?.value || '',
      video:   document.getElementById('video_' + ex.id)?.value || ''
    };
  });
  saveDraft();
}

function restoreDraftIntoForm() {
  const key  = draftKey();
  const data = draft[key];
  if(!data) return;
  PROGRAM[currentDay].forEach(ex => {
    const d = data[ex.id];
    if(!d) return;
    const table = document.getElementById('sets_' + ex.id);
    if(table && d.sets && d.sets.length > 0) {
      while(table.rows.length > 1) table.deleteRow(1);
      d.sets.forEach((s, i) => {
        const n = i + 1;
        const row = table.insertRow();
        row.innerHTML =
          '<td class="set-num">' + n + '</td>' +
          '<td><input class="set-input" placeholder="es. 80" type="number" step="0.5" id="load_' + ex.id + '_' + n + '" value="' + s.load + '"></td>' +
          '<td><input class="set-input" placeholder="es. 8"  type="number" id="reps_' + ex.id + '_' + n + '" value="' + s.reps + '"></td>' +
          '<td><input class="set-input" placeholder="0-3"    type="number" min="0" max="5" id="rir_' + ex.id + '_' + n + '" value="' + s.rir + '"></td>';
        row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', readFormIntoDraft));
      });
    }
    if(d.feeling) setFeeling(ex.id, d.feeling);
    const notesEl = document.getElementById('notes_' + ex.id);
    const videoEl = document.getElementById('video_' + ex.id);
    if(notesEl) notesEl.value = d.notes || '';
    if(videoEl) videoEl.value = d.video || '';
  });
}

function attachAutoSave(exId) {
  const notesEl = document.getElementById('notes_' + exId);
  const videoEl = document.getElementById('video_' + exId);
  if(notesEl) notesEl.addEventListener('input', readFormIntoDraft);
  if(videoEl) videoEl.addEventListener('input', readFormIntoDraft);
  const table = document.getElementById('sets_' + exId);
  if(table) table.querySelectorAll('input').forEach(inp => inp.addEventListener('input', readFormIntoDraft));
}

function saveSession() {
  const week = parseInt(document.getElementById('weekSelect').value);
  const date = document.getElementById('sessionDate').value || new Date().toISOString().split('T')[0];
  const exs = PROGRAM[currentDay];
  const exerciseData = [];

  exs.forEach(ex => {
    const table = document.getElementById('sets_' + ex.id);
    if(!table) return;
    const sets = [];
    for(let i=1; i<table.rows.length; i++) {
      const load = table.rows[i].querySelector(`#load_${ex.id}_${i}`)?.value;
      const reps = table.rows[i].querySelector(`#reps_${ex.id}_${i}`)?.value;
      const rir = table.rows[i].querySelector(`#rir_${ex.id}_${i}`)?.value;
      if(load || reps) sets.push({ load: parseFloat(load)||0, reps: parseInt(reps)||0, rir: parseInt(rir)||0 });
    }
    const feelBtn = document.querySelector(`[data-ex="${ex.id}"][class*="sel-"]`);
    const feeling = feelBtn ? parseInt(feelBtn.dataset.val) : null;
    const notes = document.getElementById('notes_' + ex.id)?.value || '';
    const video = document.getElementById('video_' + ex.id)?.value || '';
    exerciseData.push({ id: ex.id, name: ex.name, sets, feeling, notes, video, prescription: ex.weeks[week] });
  });

  const session = { id: Date.now(), date, week, day: currentDay, exercises: exerciseData };
  sessions.push(session);
  save();
  // Clear draft for this day/week after saving
  const key = draftKey();
  delete draft[key];
  saveDraft();
  showNotif('✅ Sessione salvata!');
  renderHistory();
  populateProgressSelect();
}

function clearForm() {
  const key = draftKey();
  delete draft[key];
  saveDraft();
  renderExercises();
  showNotif('Form resettato');
}

function gatherLogs(exId) {
  const logs = [];
  sessions.forEach(s => {
    const ex = s.exercises.find(e => e.id === exId);
    if(!ex) return;
    const topLoad = ex.sets.reduce((m,set) => (set.load||0) > m ? (set.load||0) : m, 0);
    const topE1RM = ex.sets.reduce((m,set) => {
      if(!set.load||!set.reps) return m;
      const e = calcE1RM(set.load, set.reps, set.rir||0);
      return e > m ? e : m;
    }, 0);
    const totalVolume = ex.sets.reduce((sum,set) => sum + (set.load||0)*(set.reps||0), 0);
    const totalReps = ex.sets.reduce((sum,set) => sum + (set.reps||0), 0);
    logs.push({ date:s.date, week:s.week, day:s.day, topLoad, topE1RM, feeling:ex.feeling, notes:ex.notes, sets:ex.sets, totalVolume, totalReps, prescription:ex.prescription||'' });
  });
  logs.sort((a,b) => a.date.localeCompare(b.date));
  return logs;
}

function makeSVGLineChart(logs, metric, W, H) {
  const PAD = { top:24, right:16, bottom:36, left:40 };
  const cw = W - PAD.left - PAD.right;
  const ch = H - PAD.top - PAD.bottom;

  const vals = logs.map(l => metric==='load' ? l.topLoad : metric==='e1rm' ? l.topE1RM : l.totalVolume);
  const maxV = Math.max(...vals, 1);
  const minV = Math.min(...vals.filter(v=>v>0), 0);
  const range = maxV - minV || 1;

  const px = (i) => PAD.left + (i / (logs.length - 1 || 1)) * cw;
  const py = (v) => PAD.top + ch - ((v - minV) / range) * ch;

  // Grid lines
  const steps = 4;
  let gridLines = '';
  for(let i=0;i<=steps;i++) {
    const v = minV + (range * i / steps);
    const y = py(v);
    const label = metric==='volume' ? Math.round(v) : Math.round(v)+'kg';
    gridLines += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#2a2a2e" stroke-width="1"/>`;
    gridLines += `<text x="${PAD.left-4}" y="${y+3}" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="#6b6b72">${label}</text>`;
  }

  // Area path
  const pts = logs.map((l,i) => `${px(i)},${py(vals[i])}`);
  const areaD = logs.length > 0
    ? `M${px(0)},${PAD.top+ch} L${pts.join(' L')} L${px(logs.length-1)},${PAD.top+ch} Z`
    : '';
  const lineD = logs.length > 0 ? `M${pts.join(' L')}` : '';

  // PR dots
  let prMax = 0;
  const dots = logs.map((l,i) => {
    const v = vals[i];
    const isPR = v > prMax && v > 0;
    if(isPR) prMax = v;
    const col = isPR ? '#c8f135' : '#f1c135';
    const r = isPR ? 5 : 3.5;
    return `<circle cx="${px(i)}" cy="${py(v)}" r="${r}" fill="${col}" stroke="${isPR?'#0e0e0f':'none'}" stroke-width="1.5">
      <title>${formatDate(l.date)} W${l.week}: ${Math.round(v)}${metric==='volume'?'kg·r':'kg'}${isPR?' 🏆 PR':''}</title>
    </circle>`;
  }).join('');

  // X axis labels
  const xLabels = logs.map((l,i) => {
    if(logs.length > 8 && i % 2 !== 0) return '';
    return `<text x="${px(i)}" y="${PAD.top+ch+14}" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="#6b6b72">${formatDateShort(l.date)}</text>
            <text x="${px(i)}" y="${PAD.top+ch+24}" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="#52525b">W${l.week}</text>`;
  }).join('');

  const accentColor = metric==='volume' ? '#f1c135' : '#c8f135';

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" style="min-width:${Math.max(W, logs.length*50)}px">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${accentColor}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${accentColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    ${areaD ? `<path d="${areaD}" fill="url(#areaGrad)"/>` : ''}
    ${lineD ? `<path d="${lineD}" fill="none" stroke="${accentColor}" stroke-width="2" stroke-linejoin="round"/>` : ''}
    ${dots}
    ${xLabels}
  </svg>`;
}

function renderCharts() {
  const exId = document.getElementById('chartsExSelect').value;
  const metric = document.getElementById('chartsMetric').value;
  const container = document.getElementById('chartsContainer');
  if(!exId) { container.innerHTML = ''; return; }

  const logs = gatherLogs(exId);
  if(logs.length === 0) { container.innerHTML = '<div class="chart-empty">Nessun dato ancora per questo esercizio.</div>'; return; }

  const exName = document.getElementById('chartsExSelect').options[document.getElementById('chartsExSelect').selectedIndex].text;

  // Stats
  const prLoad = Math.max(...logs.map(l=>l.topLoad));
  const prE1RM = Math.max(...logs.map(l=>l.topE1RM));
  const prVol  = Math.max(...logs.map(l=>l.totalVolume));
  const prLoadDate = logs.filter(l=>l.topLoad===prLoad).pop()?.date;
  const prE1RMDate = logs.filter(l=>l.topE1RM===prE1RM).pop()?.date;
  const lastLog = logs[logs.length-1];
  const prevLog = logs[logs.length-2];
  const vals = logs.map(l => metric==='load'?l.topLoad : metric==='e1rm'?l.topE1RM : l.totalVolume);
  const lastVal = vals[vals.length-1];
  const prevVal = vals.length>1 ? vals[vals.length-2] : null;
  const delta = prevVal !== null ? lastVal - prevVal : null;

  // Volume bars (mini bar chart)
  const maxVol = Math.max(...logs.map(l=>l.totalVolume), 1);

  // Table rows
  let prLoadSeen = 0, prE1RMSeen = 0;
  const tableRows = logs.map(l => {
    const isLoadPR = l.topLoad > prLoadSeen && l.topLoad > 0;
    const isE1RMPR = l.topE1RM > prE1RMSeen && l.topE1RM > 0;
    if(isLoadPR) prLoadSeen = l.topLoad;
    if(isE1RMPR) prE1RMSeen = l.topE1RM;
    const feelEmoji = l.feeling ? ['','💀','😤','😐','💪','🔥'][l.feeling] : '—';
    const setsStr = l.sets.filter(s=>s.load||s.reps).map((s,i)=>`${s.load}×${s.reps}`).join(', ');
    return `<tr>
      <td>${formatDate(l.date)}</td>
      <td style="color:var(--muted2)">W${l.week} G${l.day}</td>
      <td>${l.topLoad>0?l.topLoad+'kg':'—'}${isLoadPR?'<span class="pr-badge">PR</span>':''}</td>
      <td>${l.topE1RM>0?'~'+l.topE1RM+'kg':'—'}${isE1RMPR?'<span class="pr-badge">PR</span>':''}</td>
      <td>${l.totalVolume>0?l.totalVolume.toFixed(0)+'kg':'—'}</td>
      <td style="font-size:14px">${feelEmoji}</td>
      <td style="color:var(--muted2);font-size:10px">${setsStr||'—'}</td>
    </tr>`;
  }).reverse().join('');

  const metricLabel = metric==='load' ? 'Top Load' : metric==='e1rm' ? '~1RM stimato' : 'Volume totale';
  const metricUnit  = metric==='volume' ? 'kg·r' : 'kg';
  const deltaClass  = delta === null ? '' : delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
  const deltaStr    = delta === null ? '' : (delta>0?'+':'')+Math.round(delta)+metricUnit;

  container.innerHTML = `
    <!-- STAT CARDS -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">🏆 PR Carico</div>
        <div class="stat-value">${prLoad>0?prLoad:'—'}<span style="font-size:14px;color:var(--muted)">kg</span></div>
        <div class="stat-sub">${prLoadDate?formatDate(prLoadDate):''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚡ PR ~1RM</div>
        <div class="stat-value">${prE1RM>0?prE1RM:'—'}<span style="font-size:14px;color:var(--muted)">kg</span></div>
        <div class="stat-sub">${prE1RMDate?formatDate(prE1RMDate):''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📊 Sessioni</div>
        <div class="stat-value">${logs.length}</div>
        <div class="stat-sub">registrate</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">↕ Ultima vs Prec.</div>
        <div class="stat-value ${deltaClass}" style="font-size:22px">${delta!==null?deltaStr:'—'}</div>
        <div class="stat-sub">${metricLabel}</div>
      </div>
    </div>

    <!-- LINE CHART -->
    <div class="chart-card">
      <div class="chart-card-header">${metricLabel.toUpperCase()} NEL TEMPO — ${exName}</div>
      <div class="chart-card-body">
        ${makeSVGLineChart(logs, metric, 560, 180)}
      </div>
    </div>

    <!-- VOLUME BARS -->
    <div class="chart-card">
      <div class="chart-card-header">VOLUME TOTALE PER SESSIONE (kg × reps)</div>
      <div class="chart-card-body" style="overflow-x:auto">
        <div style="display:flex;align-items:flex-end;gap:6px;height:90px;min-width:${logs.length*44}px">
          ${logs.map(l => {
            const h = Math.round((l.totalVolume/maxVol)*70);
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted2)">${l.totalVolume>0?l.totalVolume.toFixed(0):''}</div>
              <div style="width:100%;background:var(--accent2);opacity:0.7;border-radius:3px 3px 0 0;height:${h}px;min-height:${l.totalVolume>0?2:0}px"></div>
              <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-align:center">${formatDateShort(l.date)}<br>W${l.week}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- FEELING TIMELINE -->
    ${logs.some(l=>l.feeling) ? `
    <div class="chart-card">
      <div class="chart-card-header">FEELING PER SESSIONE</div>
      <div class="chart-card-body">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${logs.filter(l=>l.feeling).map(l=>`
            <div style="text-align:center">
              <div style="font-size:20px">${['','💀','😤','😐','💪','🔥'][l.feeling]}</div>
              <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted)">${formatDateShort(l.date)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- TABLE -->
    <div class="chart-card">
      <div class="chart-card-header">TABELLA STORICO COMPLETO</div>
      <div class="chart-card-body" style="overflow-x:auto">
        <table class="prog-table">
          <thead><tr>
            <th>DATA</th><th>SETTIMANA</th><th>TOP LOAD</th><th>~1RM</th><th>VOLUME</th><th>FEEL</th><th>SERIE</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;
}



// ============================================================
// THEME
// ============================================================
const THEMES = {
  lime:   { accent: '#c8f135', accent2: '#f1c135' },
  red:    { accent: '#ff4d4d', accent2: '#ff8080' },
  yellow: { accent: '#f1c135', accent2: '#f1e035' },
  green:  { accent: '#4dff91', accent2: '#35f1c8' },
  orange: { accent: '#ff6b35', accent2: '#ffaa35' },
  white:  { accent: '#e8e8ea', accent2: '#c8c8cc' },
  grey:   { accent: '#9898a0', accent2: '#c0c0c8' },
  purple: { accent: '#a855f7', accent2: '#c084fc' },
  blue:   { accent: '#3b82f6', accent2: '#60a5fa' },
};

function setTheme(name) {
  const t = THEMES[name];
  if(!t) return;
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--accent2', t.accent2);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
  const btn = document.querySelector(`.theme-btn[onclick="setTheme('${name}')"]`);
  if(btn) btn.classList.add('active-theme');
  localStorage.setItem('ila_b3_theme', name);
  document.querySelectorAll('.entry-ex').forEach(el => el.style.borderLeftColor = t.accent);
}

function applyRandomTheme() {
  const saved = localStorage.getItem('ila_b3_theme');
  if(saved && THEMES[saved]) { setTheme(saved); return; }
  const keys = Object.keys(THEMES);
  setTheme(keys[Math.floor(Math.random() * keys.length)]);
}

function calcE1RM(load, reps, rir) {
  const eff = (reps || 0) + (rir || 0);
  if(eff <= 1) return load;
  return Math.round(load * (1 + eff / 30));
}

function formatDate(d) {
  if(!d) return '';
  const [y, m, dd] = d.split('-');
  return dd + '/' + m + '/' + y;
}

function formatDateShort(d) {
  if(!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}`;
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}
</script>
</body>
</html>
